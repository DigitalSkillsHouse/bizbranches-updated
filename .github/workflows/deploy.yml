# Deploy to cPanel via FTP.
# - Path-based deploy: only frontend or backend runs when only that part changed.
# - FTP sync state is cached with a STABLE key (same save/restore key) so the next run
#   restores it and FTP-Deploy-Action uploads only changed files (fixes 2–3 hour full syncs).
# - Backend now saves sync state after deploy; frontend uses one cache key (no run_id).

name: Deploy to cPanel via FTP

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target (leave empty to use path detection on push)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - frontend
          - backend
          - all

env:
  NODE_VERSION: "20"
  PHP_VERSION: "8.2"

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend-php/**'
            frontend:
              - 'frontend/**'
              - 'cpanel-htaccess'
            config:
              - '.github/workflows/**'

  deploy-backend:
    name: Deploy PHP Backend
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'backend' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '') ||
      github.event_name != 'workflow_dispatch' && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.config == 'true')
    steps:
      - name: Check required secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "::error::Set FTP_SERVER, FTP_USERNAME, FTP_PASSWORD in repo Settings > Secrets and variables > Actions"
            echo "Optional: FTP_DEPLOY_DIR (defaults to ./ i.e. FTP root), SITE_URL, CLOUDINARY_CLOUD_NAME"
            exit 1
          fi
          echo "Secrets OK"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore FTP sync state (backend)
        uses: actions/cache@v4
        with:
          path: backend-php/.ftp-deploy-sync-state.json
          key: ftp-sync-state-backend-${{ runner.os }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Cache Composer vendor
        uses: actions/cache@v4
        with:
          path: backend-php/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend-php/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        working-directory: backend-php
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy backend to cPanel /api/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: backend-php/
          server-dir: ${{ secrets.FTP_DEPLOY_DIR || './' }}api/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/scripts/*.json
            **/scripts/mongo_id_map.json
            **/migrations/**
            **/run-migration.php

      - name: Save FTP sync state (backend)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: backend-php/.ftp-deploy-sync-state.json
          key: ftp-sync-state-backend-${{ runner.os }}

  deploy-frontend:
    name: Build & Deploy Frontend (Static)
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'frontend' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '') ||
      github.event_name != 'workflow_dispatch' && (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.config == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/pnpm-lock.yaml') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/pnpm-lock.yaml', 'frontend/next.config.mjs') }}
          restore-keys: nextjs-${{ runner.os }}-

      - name: Create frontend .env
        working-directory: frontend
        run: |
          SITE_URL="${{ secrets.SITE_URL }}"
          [ -z "$SITE_URL" ] && SITE_URL="https://bizbranches.pk"
          cat << EOF > .env.local
          NEXT_PUBLIC_BACKEND_URL=$SITE_URL
          BACKEND_URL=$SITE_URL
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_SITE_URL=$SITE_URL
          NEXT_PUBLIC_STATIC_EXPORT=true
          NODE_ENV=production
          EOF

      - name: Build Next.js (static export)
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "true"

      - name: Verify build output
        run: |
          if [ ! -f frontend/out/index.html ]; then
            echo "::error::Build did not produce frontend/out/index.html"
            ls -la frontend/out/ 2>/dev/null || echo "frontend/out/ missing"
            exit 1
          fi
          echo "Build output OK"

      - name: Copy .htaccess to out
        run: cp cpanel-htaccess frontend/out/.htaccess

      - name: Restore FTP sync state (frontend)
        uses: actions/cache@v4
        with:
          path: frontend/out/.ftp-deploy-sync-state.json
          key: ftp-sync-state-frontend-${{ runner.os }}

      - name: Deploy static site to cPanel via FTP
        id: deploy-frontend-ftp
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/out/
          server-dir: ${{ secrets.FTP_DEPLOY_DIR || './' }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/api/**

      - name: Save FTP sync state (frontend)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: frontend/out/.ftp-deploy-sync-state.json
          key: ftp-sync-state-frontend-${{ runner.os }}
